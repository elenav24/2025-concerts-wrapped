<!DOCTYPE html>

  <head>
    <title>2025 Concerts Wrapped</title>
    <link rel="icon" type="image/x-icon" href="/logo.png">
    <link rel="stylesheet" href="../style.scss">
    <script defer src="/scripts/concert.js"></script>
    <html data-theme="dark"></html>
  </head>

  <body>
    <header>
        <div class="header-container">
            <h2 style="text-align: center;">Concert Details</h2>
        </div>
    </header>
    <main id="concert-content" class="concert-detail">
        <div class="concert-detail-image-container">
            <img id="concert-detail-image" src="" alt="Concert Image">
        </div>
        <div class="concert-detail-info">
            <h3 id="concert-artist"></h3>
            <h4 id="concert-title"></h4>
            <h4 id="concert-venue"></h4>
            <h4 id="concert-date"></h4>
        </div>
        <button onclick="window.history.back()">Back to Concerts</button>
    </main>
  </body>

</html>
